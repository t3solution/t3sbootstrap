<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<div class="modal fade" id="navbarModal-{data.uid}" tabindex="-1" aria-labelledby="navbarModalLabel" aria-hidden="true">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-body">
				<f:if condition="{data.content_from_pid}">
					<f:then>
						<f:variable name="pageUid">{data.content_from_pid}</f:variable>
					</f:then>
					<f:else>
						<f:variable name="pageUid">{data.uid}</f:variable>
					</f:else>
				</f:if>
				<f:cObject typoscriptObjectPath="lib.dynamicContent" data="{pageUid: '{pageUid}', colPos: '0'}"/>
			</div>
		</div>
	</div>
</div>
</html>
